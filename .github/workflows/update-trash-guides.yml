name: Update TRaSH Guides Data

on:
  schedule:
    - cron: '0 0 * * 0'  # Runs every Sunday at midnight UTC
  workflow_dispatch:      # Allows manual triggering

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Required to commit changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run update script
        run: node scripts/update-dmm-with-trash-guides.js

      - name: Check for changes in button-data.js
        id: check_changes
        run: |
          if git diff --quiet libs/dmm/button-data.js; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit button-data.js changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add libs/dmm/button-data.js
          git commit -m "chore: update DMM button data from TRaSH Guides"
          git push

      - name: Update userscript with new commit hash
        if: steps.check_changes.outputs.changed == 'true'
        env:
          REPO_FULL: ${{ github.repository }}
        run: |
          # Get the latest commit hash
          NEW_COMMIT=$(git rev-parse HEAD)
          
          # Update the @require line in the userscript with the new commit hash (dynamic repo)
          sed -i "s|@require.*button-data\.min\.js|@require       https://cdn.jsdelivr.net/gh/${REPO_FULL}@${NEW_COMMIT}/libs/dmm/button-data.min.js|g" userscripts/dmm-add-trash-buttons.user.js
          
          # Bump the version number (patch version)
          sed -i -E 's/(@version\s+)([0-9]+\.[0-9]+\.)([0-9]+)/echo "\1\2$((\3+1))"/e' userscripts/dmm-add-trash-buttons.user.js
          
          # Commit the userscript update
          git add userscripts/dmm-add-trash-buttons.user.js
          git commit -m "chore: update userscript to reference latest button-data.js" \
            -m "Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          git push
